<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <link rel="stylesheet" href="styles.css">
</head>
<title>DNA Sequence Manipulator</title>
<body>
    <h1>Hello everybody :)</h1>
    <form action="/" method="post">
        <label for="sequence">Enter DNA Sequence:</label><br>
        <input type="text" id="sequence" name="sequence" value="{{ complement or reverse or '' }}" required><br>
        <input type="submit" name="action" value="Complement">
        <input type="submit" name="action" value="Reverse Sequence">
    </form>
</body>
</html>
